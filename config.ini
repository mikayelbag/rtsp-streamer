# ════════════════════════════════════════════════════════════════════
#  RTSP Streamer
#
#  Every video becomes a looping RTSP stream:
#      video_samples/ids/clip.mp4  →  rtsp://<ip>:41000/ids/clip
#
#  "keep" = stream the file as-is, no re-encoding.
# ════════════════════════════════════════════════════════════════════

[streamer]
videos        = video_samples       ; source videos, one subfolder per group
                                    ;   (in Docker these two are pinned to the
workspace     = workspace           ; cache + logs (safe to delete)
                                    ;    volume mounts via VIDEOS_DIR /
                                    ;    WORKSPACE_DIR; edit the compose volumes,
                                    ;    not these keys)

ports         = 41000, 41001, 41002 ; first free one is used
transport     = tcp                 ; tcp | udp | both
advertise_ip  =                     ; IP shown in URLs (blank = auto)
keyint        = 60                  ; keyframe interval in frames (global).
                                    ; Worst-case client join wait = keyint/fps
                                    ; (60 = 2s @ 30fps, camera-typical).
                                    ; Lower = faster joins, slightly higher
                                    ; bitrate. Changing it rebuilds cached
                                    ; files automatically on the next start.

copies        = 1                   ; streams created per video
shift_frames  = 0                   ; frame offset between copies: copy i starts
                                    ; at frame i*shift (forward-rotated, no
                                    ; drift); out-of-phase camera simulation
fps           = keep                ; e.g. 25
size          = keep                ; e.g. 1920x1080
bitrate_kbps  = keep                ; e.g. 2000
probe         = false               ; true = black until `touch workspace/start`
                                    ; (all probes) or `touch
                                    ; workspace/start_<folder>_<name>` (just
                                    ; that camera), then plays content once,
                                    ; then black again
mini          = false               ; true = short-clip mode: 1-min loop of
                                    ; [first frame frozen 10s] + [clip] + [black].
                                    ; streams mount as numbers (/mini/1, /mini/2,
                                    ; ... in scan order); the number -> file map
                                    ; is workspace/<folder>/manifest.txt.
                                    ; composes with probe (fire -> black -> frozen
                                    ; -> clip -> black). ignores shift_frames.
concat        = false               ; true = chain ALL of a folder's videos into
                                    ; ONE looping stream (/<folder>/chain): per
                                    ; video [first frame frozen 3s] + [clip] +
                                    ; [last frame frozen 3s] + [2s black], each
                                    ; video's index burned into its top-left
                                    ; corner. Mixed sources are normalised to
                                    ; `size`/`fps` (1920x1080 @ 30 when "keep").
                                    ; index -> file + start-offset map:
                                    ; workspace/<folder>/manifest.txt
force_reencode = false              ; true = always re-encode (normalised
                                    ;        H.264, keyframes per `keyint` —
                                    ;        smoothest playback and joins)
camera_grade  = false               ; true = force real-camera H.264: sources
                                    ; with B-frames / long GOP re-encode so
                                    ; streams behave exactly like IP cameras.
                                    ; false (default) = serve them as-is (no
                                    ; re-encode, faster first run); their URLs
                                    ; get a (!) marker — clients joining
                                    ; mid-stream may glitch briefly. Unsupported
                                    ; codecs still re-encode (compatibility,
                                    ; not realism).

# ── Overrides (optional) ────────────────────────────────────────────
# Same keys as above, for one folder or one video:
#
#   [folder:ids]            ; everything in video_samples/ids/
#   copies        = 4
#   shift_frames  = 30
#
#   [video:ids/clip1]       ; just video_samples/ids/clip1.mp4
#   size = 1280x720
#
#   [video:ids/broken]      ; skip a file
#   copies = 0

# ── Mini clips ──────────────────────────────────────────────────────
# Drop short side-clips into video_samples/mini/ to get the 1-minute mini
# loop (first frame frozen 10s + clip + black). Streams mount as numbers
# (rtsp://.../mini/1, /mini/2, ...); workspace/mini/manifest.txt maps each
# number back to its file. This section is harmless if the folder doesn't
# exist yet — it only applies to videos actually found under
# video_samples/mini/, so an absent folder simply means no mini streams.
[folder:mini]
mini = true

# ── Concat chain ────────────────────────────────────────────────────
# Drop videos into video_samples/concat/ and they chain into ONE looping
# stream at rtsp://.../concat/chain: per video, first frame frozen 3s ->
# clip -> last frame frozen 3s -> 2s black -> next. Each video's index is
# burned into its top-left corner; workspace/concat/manifest.txt maps
# index -> file + where it starts inside the loop. Harmless if the folder
# doesn't exist.
[folder:concat]
concat = true
